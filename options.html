<!doctype html>
<html>
  <head>
    <title>Ram Killer Settings</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
      }

      .container {
        background: white;
        width: 100%;
        max-width: 520px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h2 {
        margin-top: 0;
        margin-bottom: 25px;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 6px;
      }

      input[type="number"],
      textarea,
      select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #dcdfe6;
        font-size: 14px;
        outline: none;
        transition: 0.2s ease;
        box-sizing: border-box;
      }

      input[type="number"]:focus,
      textarea:focus,
      select:focus {
        border-color: #ff6b00;
        box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.15);
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .checkbox-group input {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff6b00;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
      }

      button:hover {
        background: #e55f00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 style="text-align: center">Ram Killer Settings</h2>

      <div class="form-group">
        <label for="idleTime">Idle time (minutes)</label>
        <input type="number" id="idleTime" min="1" />
      </div>

      <div class="form-group">
        <label for="whitelist"> Whitelist (one per line) </label>

        <textarea
          id="whitelist"
          placeholder="*.youtube.com&#10;*.mail.google.com"
        ></textarea>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="skipPinned" />
        <label for="skipPinned">Skip pinned tabs</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="skipAudio" />
        <label for="skipAudio">Skip tabs playing audio</label>
      </div>

      <div class="form-group">
        <label for="mode">Suspension Mode</label>
        <select id="mode">
          <option value="discard">Discard (Best Memory Saving)</option>
          <option value="autoReload">Auto Reload After Idle</option>
          <option value="manualReload">Manual Reload (Reload on Click)</option>
        </select>
      </div>

      <button id="save">Save Settings</button>
    </div>

    <script src="options.js"></script>
  </body>
</html>
