<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ram Killer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f172a;
        --surface: rgba(30, 41, 59, 0.7);
        --accent: #fb923c;
        --accent-hover: #f97316;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        width: 320px;
        overflow: hidden;
      }

      .container {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-group img {
        width: 24px;
        height: 24px;
      }

      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.025em;
      }

      .icon-btn {
        background: var(--surface);
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat-card {
        background: var(--surface);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(8px);
      }

      .stat-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 600;
      }

      .stat-value span {
        color: var(--accent);
      }

      .ram-saved {
        background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
        padding: 16px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 12px rgba(251, 146, 60, 0.2);
      }

      .ram-info h3 {
        margin: 0;
        font-size: 12px;
        opacity: 0.8;
      }

      .ram-info .value {
        font-size: 24px;
        font-weight: 700;
      }

      .ram-saved svg {
        opacity: 0.3;
        width: 40px;
        height: 40px;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .primary-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .primary-btn:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(251, 146, 60, 0.3);
      }

      .primary-btn:active {
        transform: translateY(0);
      }

      .secondary-btn {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--glass-border);
        padding: 8px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .secondary-btn:hover {
        color: var(--text);
        border-color: var(--text-muted);
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .scanning {
        animation: pulse 1.5s infinite ease-in-out;
      }

      .footer {
        text-align: center;
        margin-top: 8px;
        font-size: 11px;
        color: var(--text-muted);
      }
      .footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }
      .footer a:hover {
        color: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-group">
          <img src="icon_pro.png" alt="logo" />
          <h1>Ram Killer <span style="color: var(--accent)">Pro</span></h1>
        </div>
        <button id="settings" class="icon-btn" title="Settings">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </header>

      <div class="ram-saved">
        <div class="ram-info">
          <h3>EST. MEMORY RECOVERED</h3>
          <div class="value" id="ramValue">0 MB</div>
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 12L10 16L18 8" />
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Suspended</div>
          <div class="stat-value"><span id="count">0</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Tabs</div>
          <div class="stat-value" id="totalTabs">0</div>
        </div>
      </div>

      <div class="actions">
        <button id="killNow" class="primary-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 11V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6" />
            <path d="m12 12 4 10 1.7-4.3L22 16Z" />
          </svg>
          Kill Idle Tabs Now
        </button>
        <button id="resetStats" class="secondary-btn">Reset Stats</button>
      </div>

      <div class="footer">
        Developed by <a href="https://riponmondalbd.vercel.app/" target="_blank">Ripon</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
